version: "3.9"

services:
  frontend:
    build: ./frontend
    container_name: healthai_frontend
    environment:
      - PORT=80
    depends_on:
      - backend
    restart: always

  backend:
    build: ./backend
    container_name: healthai_backend
    environment:
      - SECRET_KEY=hk_pro_2026_safe_key
      - DATABASE_URL=sqlite:///./healthai.db
      - ALLOWED_ORIGINS=http://localhost:3000,https://healthai-production.up.railway.app
      - PORT=8000
    volumes:
      - healthai_data:/app/data
    restart: always



volumes:
  healthai_data:

networks:
  default:
    name: healthai_network
